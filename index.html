<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chiinyan's Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Questrial&display=swap">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'M PLUS Rounded 1c', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    padding: 20px;
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 600px; margin: 40px auto; }
  h1 { text-align: center; color: #2c5282; margin-bottom: 32px; font-size: 32px; }

  input, button { padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; font-family: inherit; }
  button { background: #4299e1; color: #fff; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
  button:hover { background: #3182ce; }

  .login-box {
    background: #fff; padding: 32px; border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    max-width: 380px; margin: 0 auto;
  }
  .login-box .row { display: flex; flex-direction: column; gap: 10px; }
  .login-error { color: #c53030; font-size: 13px; min-height: 20px; }
  .login-status { text-align: center; color: #a0aec0; font-size: 11px; margin-top: 16px; }

  .league-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }
  .league-card {
    background: #fff; padding: 32px 20px; border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-align: center; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    text-decoration: none; color: inherit;
    display: block;
  }
  .league-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }
  .league-icon { font-size: 48px; margin-bottom: 12px; }
  .league-name { font-size: 20px; font-weight: bold; color: #2c5282; margin-bottom: 4px; }
  .league-desc { font-size: 13px; color: #718096; }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: #2c5282; color: #fff; padding: 8px 16px; border-radius: 8px;
    margin-bottom: 24px; font-size: 13px;
  }
  .status-bar button {
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
    padding: 4px 12px; font-size: 12px;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-left: 6px; }
  .role-admin { background: #d69e2e; color: #fff; }
  .role-viewer { background: #718096; color: #fff; }

  @media (max-width: 500px) {
    .league-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>🀄Private Chiinyan's Club🀄</h1>

  <!-- ログイン画面 -->
  <div id="loginSection">
    <div class="login-box">
      <p style="text-align:center; color:#718096; margin-bottom:16px; font-size:13px;">パスワードを入力してください</p>
      <div class="row">
        <input type="password" id="loginPassword" placeholder="パスワード" autocomplete="current-password">
        <button onclick="tryLogin()">ログイン</button>
      </div>
      <div class="login-error" id="loginError"></div>
      <p class="login-status" id="loginStatus">接続中...</p>
    </div>
  </div>

  <!-- リーグ選択画面 -->
  <div id="leagueSection" style="display:none">
    <div class="status-bar">
      <span>
        ログイン済み <span id="roleBadge"></span>
      </span>
      <button onclick="logout()">ログアウト</button>
    </div>
    <p style="text-align:center; color:#718096; margin-bottom:24px;">参加するリーグを選んでください</p>
    <div class="league-grid">
      <a href="league1.html" class="league-card">
        <div class="league-icon">🏆</div>
        <div class="league-name">🀄Chiinyan's LEAGUE 2026🀄</div>
        <div class="league-desc">年間リーグ戦</div>
      </a>
      <a href="league2.html" class="league-card">
        <div class="league-icon">👫</div>
        <div class="league-name">🀄ペアマッチ🀄</div>
        //<div class="league-desc">2026年05月</div>
      </a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script>
// ================ Firebase設定 ================
const firebaseConfig = {
  apiKey: "AIzaSyAkA7H9orEAPxeR5kUvdRWeN1R_fXWyslE",
  authDomain: "chiinyan-sleague2026.firebaseapp.com",
  projectId: "chiinyan-sleague2026",
  storageBucket: "chiinyan-sleague2026.firebasestorage.app",
  messagingSenderId: "371357773945",
  appId: "1:371357773945:web:2de5700958e4ee63fea4a8"
};
// ==============================================

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

async function init() {
  document.getElementById('loginPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  try {
    document.getElementById('loginStatus').textContent = '接続中...';
    await auth.signInAnonymously();
    document.getElementById('loginStatus').textContent = '準備完了。パスワードを入力してください。';

    const uid = auth.currentUser.uid;
    const memberDoc = await db.collection('members').doc(uid).get();
    const savedRole = localStorage.getItem('mahjongRole');
    if (memberDoc.exists && savedRole) {
      showLeagueSelect(memberDoc.data().role || savedRole);
    }
  } catch (err) {
    console.error(err);
    document.getElementById('loginStatus').textContent = '接続に失敗しました: ' + err.message;
  }
}

async function tryLogin() {
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  const pw = document.getElementById('loginPassword').value.trim();
  if (!pw) { errEl.textContent = 'パスワードを入力してください'; return; }

  try {
    const configDoc = await db.collection('config').doc('app').get();
    if (!configDoc.exists) {
      errEl.textContent = '設定が見つかりません。管理者に確認してください。';
      return;
    }
    const cfg = configDoc.data();
    let role = null;
    if (cfg.adminPassword && pw === cfg.adminPassword) role = 'admin';
    else if (cfg.viewerPassword && pw === cfg.viewerPassword) role = 'viewer';

    if (!role) {
      errEl.textContent = 'パスワードが違います';
      return;
    }

    const uid = auth.currentUser.uid;
    await db.collection('members').doc(uid).set({
      role,
      joinedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    localStorage.setItem('mahjongRole', role);
    showLeagueSelect(role);
  } catch (err) {
    console.error(err);
    errEl.textContent = 'エラー: ' + err.message;
  }
}

function showLeagueSelect(role) {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('leagueSection').style.display = 'block';
  const badge = document.getElementById('roleBadge');
  if (role === 'admin') {
    badge.innerHTML = '<span class="role-badge role-admin">管理者</span>';
  } else {
    badge.innerHTML = '<span class="role-badge role-viewer">閲覧者</span>';
  }
}

function logout() {
  if (!confirm('ログアウトしますか？')) return;
  localStorage.removeItem('mahjongRole');
  location.reload();
}

init();
</script>
</body>
</html>
