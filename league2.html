<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年5月ペアマッチ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Questrial&display=swap">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'M PLUS Rounded 1c', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    padding: 20px;
    line-height: 1.6;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { text-align: center; color: #2c5282; margin-bottom: 24px; font-size: 28px; }
  h2 { color: #2c5282; border-bottom: 2px solid #4299e1; padding-bottom: 6px; margin-bottom: 16px; font-size: 20px; }
  h3 { color: #2c5282; font-size: 16px; margin: 16px 0 8px; }
  .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  input, select, button { padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; font-family: inherit; }
  input[type="text"], input[type="number"], input[type="date"], input[type="password"] { flex: 1; min-width: 120px; }
  button { background: #4299e1; color: #fff; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
  button:hover { background: #3182ce; }
  button.danger { background: #e53e3e; }
  button.danger:hover { background: #c53030; }
  button.small { padding: 4px 10px; font-size: 12px; }
  button.secondary { background: #718096; }
  button.secondary:hover { background: #4a5568; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { padding: 10px 8px; text-align: center; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
  th { background: #ebf4ff; color: #2c5282; font-weight: bold; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { background: #bee3f8; }
  th.sortable .sort-icon { font-size: 10px; margin-left: 4px; opacity: 0.5; }
  th.sortable.active .sort-icon { opacity: 1; color: #2b6cb0; }
  tr:hover td { background: #f7fafc; }
  .rank-1 { color: #d69e2e; font-weight: bold; }
  .rank-2 { color: #718096; font-weight: bold; }
  .rank-3 { color: #b7791f; font-weight: bold; }
  /*.positive { color: #2f855a; }*/
  /*.negative { color: #c53030; }*/
  .positive { color: #319795; }
  .negative { color: #d53f8c; }
  .points-cell {
    text-align: right;
    padding-right: 16px;
    font-family: 'Questrial', 'Menlo', 'Consolas', 'Courier New', monospace;
    font-variant-numeric: tabular-nums;
    /* white-space: pre; */
  }
  .pt-sign {
    display: inline-block;
    width: 0.4em;
    text-align: right;
  }
  .pt-num {
    display: inline-block;
    text-align: right;
    min-width: 3.2em;
  }
  .history-cell {
    font-family: 'Questrial', 'Menlo', 'Consolas', 'Courier New', monospace;
    font-variant-numeric: tabular-nums;
    white-space: pre;
    line-height: 1.4;
  }
  .history-cell .player-name {
    font-family: 'M PLUS Rounded 1c', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    font-weight: bold;
    display: block;
    margin-bottom: 2px;
  }
  .history-cell .score-line { font-size: 12px; color: #4a5568; display: block;}
  .history-cell .points-line { font-size: 12px; display: block; }
  .table-tag { display: inline-block; background: #4299e1; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
  .round-tag { display: inline-block; background: #9f7aea; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
  .game-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }
  .game-inputs > div { display: flex; flex-direction: column; gap: 4px; }
  .game-inputs label { font-size: 12px; color: #4a5568; font-weight: bold; }
  .hint { font-size: 11px; color: #a0aec0; }
  .empty { text-align: center; color: #a0aec0; padding: 20px; }
  .toolbar { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
  .badge { display: inline-block; background: #4299e1; color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 8px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 2px solid #e2e8f0; }
  .tab { padding: 8px 16px; background: #edf2f7; border: none; border-radius: 6px 6px 0 0; cursor: pointer; font-weight: bold; color: #4a5568; font-size: 14px; }
  .tab.active { background: #4299e1; color: #fff; }
  .filter-row { background: #f7fafc; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
  .daily-section { margin-bottom: 24px; border-left: 4px solid #4299e1; padding-left: 12px; }
  .daily-date { font-size: 16px; font-weight: bold; color: #2c5282; margin-bottom: 8px; }

  .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(45, 55, 72, 0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .login-box { background: #fff; padding: 32px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .login-box h2 { text-align: center; border: none; }
  .login-box .row { flex-direction: column; align-items: stretch; }
  .login-error { color: #c53030; font-size: 13px; margin-top: 8px; min-height: 20px; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; background: #2c5282; color: #fff; padding: 8px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
  .status-bar .sync-icon { font-size: 16px; }
  .status-bar button { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); padding: 4px 12px; font-size: 12px; }
  .status-bar button:hover { background: rgba(255,255,255,0.3); }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-left: 6px; }
  .role-admin { background: #d69e2e; color: #fff; }
  .role-viewer { background: #718096; color: #fff; }

  @media (max-width: 600px) {
    .game-inputs { grid-template-columns: 1fr 1fr; }
    th, td { font-size: 12px; padding: 6px 4px; }
  }

  .team-group {
    margin-bottom: 16px;
    padding: 12px;
    background: #f7fafc;
    border-radius: 8px;
    border-left: 4px solid #4299e1;
  }
  .team-group-title {
    font-weight: bold;
    color: #2c5282;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .player-list-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: #fff;
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 14px;
  }
  .player-list-card span {
    font-weight: 500;
  }
  .player-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }
  .player-input-row input {
    flex: 1;
    min-width: 100px;
  }
 
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>2026年5月ペアマッチ</h2>
    <p style="text-align:center; color:#718096; margin-bottom:16px; font-size:13px;">ログインしてください</p>
    <p class="login-error" id="loginError">ログイン状態を確認中...</p>
    <p style="text-align:center; margin-top:16px;"><a href="index.html">ログイン画面へ</a></p>
  </div>
</div>

<div class="container" id="mainContainer" style="display:none">
  <h1>👫2026年5月ペアマッチ👫</h1>

  <div class="status-bar">
    <span>
      <span>☁️</span>
      <span id="syncStatus">同期中...</span>
      <span id="roleBadge"></span>
      <span style="margin-left:12px"><a href="index.html">← 選択画面へ</a></span>
    </span>
    <button onclick="logout()">ログアウト</button>
  </div>

  <div id="adminArea" style="display:none">
    <div class="card">
      <h2>プレイヤー登録 <span class="badge" id="playerCount">0人</span></h2>
      <div class="player-input-row">
        <input type="text" id="newTeamName" placeholder="チーム名" maxlength="30">
        <input type="text" id="newPlayerName" placeholder="プレイヤー名" maxlength="20">
        <button onclick="addPlayer()">追加</button>
      </div>
      <div id="playerList"></div>
    </div>

    <div class="card">
      <h2>対局結果を入力</h2>
      <div class="row">
        <label>対局日:</label>
        <input type="date" id="gameDate">
        <label>区分:</label>
        <select id="gamePhase" style="max-width:120px">
          <option value="qualifying">予選</option>
          <option value="final">決勝</option>
        </select>
        <label>卓:</label>
        <select id="gameTable" style="max-width:100px">
          <option value="A">A卓</option>
          <option value="B">B卓</option>
          <option value="C">C卓</option>
        </select>
        <label>回戦:</label>
        <select id="gameRound" style="max-width:120px">
          <option value="1">1回戦</option>
          <option value="2">2回戦</option>
          <option value="3">3回戦</option>
          <option value="4">4回戦</option>
          <option value="5">5回戦</option>
          <option value="6">6回戦</option>
          <option value="7">7回戦</option>
          <option value="8">8回戦</option>
        </select>
      </div>
      <div class="row">
        <label>ウマ(1-2-3-4位):</label>
        <input type="text" id="umaConfig" value="30,10,-10,-30" style="max-width:140px">
        <label>オカ:</label>
        <input type="number" id="okaConfig" value="20" style="max-width:80px">
        <label>持ち点:</label>
        <input type="number" id="startPoint" value="25000" style="max-width:100px">
        <label>返し点:</label>
        <input type="number" id="returnPoint" value="30000" style="max-width:100px">
      </div>
      <div class="game-inputs" id="gameInputs"></div>
      <div class="row">
        <span class="hint">※ 素点は下2桁の "00" を省略できます。</span>
      </div>
      <div class="row">
        <button onclick="addGame()">この対局を記録</button>
        <span id="scoreSum" style="color:#718096;font-size:13px;"></span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>順位表（チーム別）</h2>
    <div class="tabs">
      <div class="tab active" data-tab="qualifying" onclick="switchTab('qualifying')">予選順位</div>
      <div class="tab" data-tab="final" onclick="switchTab('final')">決勝順位</div>
    </div>
    <div id="tab-qualifying" class="tab-content">
      <div id="qualifyingRanking"></div>
    </div>
    <div id="tab-final" class="tab-content" style="display:none">
      <div id="finalRanking"></div>
    </div>
  </div>

  <div class="card">
    <h2>対局履歴 <span class="badge" id="gameCount">0局</span></h2>
    <div class="row">
      <label>表示:</label>
      <select id="historyFilter" onchange="renderHistory()">
        <option value="all">全て</option>
        <option value="qualifying">予選のみ</option>
        <option value="final">決勝のみ</option>
      </select>
    </div>
    <div class="toolbar" id="historyToolbar">
      <button class="small" onclick="exportData()">データ書き出し</button>
    </div>
    <div id="gameHistory"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script>
// ================ Firebase設定 ================
const firebaseConfig = {
  apiKey: "AIzaSyAkA7H9orEAPxeR5kUvdRWeN1R_fXWyslE",
  authDomain: "chiinyan-sleague2026.firebaseapp.com",
  projectId: "chiinyan-sleague2026",
  storageBucket: "chiinyan-sleague2026.firebasestorage.app",
  messagingSenderId: "371357773945",
  appId: "1:371357773945:web:2de5700958e4ee63fea4a8"
};
// ==============================================

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let data = { players: [], games: [] };
let currentTab = 'total';
let historySortKeys = [
  { key: 'date', dir: 'desc' },
  { key: 'phase', dir: 'asc' },
  { key: 'table', dir: 'asc' },
  { key: 'round', dir: 'asc' }
];
let unsubscribeGames = null;
let unsubscribePlayers = null;
let currentRole = null;

async function init() {
  document.getElementById('gameDate').valueAsDate = new Date();

  try {
    await auth.signInAnonymously();
    const uid = auth.currentUser.uid;
    const memberDoc = await db.collection('members').doc(uid).get();
    const savedRole = localStorage.getItem('mahjongRole');
    if (memberDoc.exists && savedRole) {
      currentRole = memberDoc.data().role || savedRole;
      enterApp();
    } else {
      location.href = 'index.html';
    }
  } catch (err) {
    console.error(err);
    document.getElementById('loginError').textContent = '接続に失敗しました: ' + err.message;
  }
}

function enterApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainContainer').style.display = 'block';

  const adminArea = document.getElementById('adminArea');
  const roleBadge = document.getElementById('roleBadge');
  const historyToolbar = document.getElementById('historyToolbar');
  if (currentRole === 'admin') {
    adminArea.style.display = 'block';
    roleBadge.innerHTML = '<span class="role-badge role-admin">管理者</span>';
    historyToolbar.style.display = 'flex';
  } else {
    adminArea.style.display = 'none';
    roleBadge.innerHTML = '<span class="role-badge role-viewer">閲覧者</span>';
    historyToolbar.style.display = 'none';
  }
  startSync();
}

function logout() {
  if (!confirm('ログアウトしますか？')) return;
  localStorage.removeItem('mahjongRole');
  if (unsubscribeGames) unsubscribeGames();
  if (unsubscribePlayers) unsubscribePlayers();
  location.href = 'index.html';
}

function startSync() {
  document.getElementById('syncStatus').textContent = '接続中...';

  unsubscribePlayers = db.collection('league2_players').orderBy('createdAt', 'asc')
    .onSnapshot(snapshot => {
      data.players = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    }, err => {
      console.error('players sync error', err);
      document.getElementById('syncStatus').textContent = '同期エラー';
    });

  unsubscribeGames = db.collection('league2_games').onSnapshot(snapshot => {
    data.games = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('syncStatus').textContent = `同期中 (最終更新: ${new Date().toLocaleTimeString()})`;
    render();
  }, err => {
    console.error('games sync error', err);
    document.getElementById('syncStatus').textContent = '同期エラー';
  });
}

function normalizeScore(raw) {
  if (raw === '' || raw === null || raw === undefined) return NaN;
  const v = parseInt(raw);
  if (isNaN(v)) return NaN;
  return Math.abs(v) < 1000 ? v * 100 : v;
}

function formatPoints(p) {
  const rounded = Math.round(p * 10) / 10;
  const abs = Math.abs(rounded);
  const numStr = abs.toFixed(1);
  let sign = '';
  if (rounded < 0) sign = '▲';
  return `<span class="pt-sign">${sign}</span><span class="pt-num">${numStr}</span>`;
}

function formatScore(s) { return s.toLocaleString('en-US'); }

// プレイヤー名から該当プレイヤーオブジェクトを取得
function findPlayerByName(name) {
  return data.players.find(p => p.name === name);
}

async function addPlayer() {
  if (currentRole !== 'admin') return alert('管理者のみ操作可能です');
  const teamInput = document.getElementById('newTeamName');
  const nameInput = document.getElementById('newPlayerName');
  const team = teamInput.value.trim();
  const name = nameInput.value.trim();
  if (!team) return alert('チーム名を入力してください');
  if (!name) return alert('プレイヤー名を入力してください');
  if (data.players.some(p => p.name === name && p.team === team)) {
    return alert('同じチーム・同じ名前のプレイヤーが既に存在します');
  }
  try {
    await db.collection('league2_players').add({
      team, name,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    teamInput.value = '';
    nameInput.value = '';
  } catch (err) {
    alert('追加に失敗: ' + err.message);
  }
}

async function removePlayer(id) {
  if (currentRole !== 'admin') return alert('管理者のみ操作可能です');
  const player = data.players.find(p => p.id === id);
  if (!player) return;
  const used = data.games.some(g => g.results.some(r => r.player === player.name));
  if (used) {
    if (!confirm(`${player.name}さんは対局履歴に含まれています。削除しますか？(履歴は残ります)`)) return;
  }
  try {
    await db.collection('league2_players').doc(id).delete();
  } catch (err) {
    alert('削除に失敗: ' + err.message);
  }
}

async function addGame() {
  if (currentRole !== 'admin') return alert('管理者のみ操作可能です');
  const date = document.getElementById('gameDate').value;
  if (!date) return alert('対局日を入力してください');
  const phase = document.getElementById('gamePhase').value;
  const tableName = document.getElementById('gameTable').value;
  const round = parseInt(document.getElementById('gameRound').value);

  const umaParts = document.getElementById('umaConfig').value.split(',').map(s => parseFloat(s.trim()));
  if (umaParts.length !== 4 || umaParts.some(isNaN)) return alert('ウマの形式が誤っています');
  const oka = parseFloat(document.getElementById('okaConfig').value) || 0;
  const startPoint = parseInt(document.getElementById('startPoint').value) || 25000;
  const returnPoint = parseInt(document.getElementById('returnPoint').value) || startPoint;

  const results = [];
  for (let i = 0; i < 4; i++) {
    const playerName = document.getElementById(`gp_${i}`).value;
    const score = normalizeScore(document.getElementById(`gs_${i}`).value);
    if (!playerName) return alert(`${i+1}人目のプレイヤーを選んでください`);
    if (isNaN(score)) return alert(`${i+1}人目の素点を入力してください`);
    if (results.some(r => r.player === playerName)) return alert('同じプレイヤーが重複しています');
    const playerObj = findPlayerByName(playerName);
    const team = playerObj ? playerObj.team : '';
    results.push({ player: playerName, team, score });
  }

  const sum = results.reduce((a, r) => a + r.score, 0);
  if (sum !== startPoint * 4) {
    if (!confirm(`素点の合計が ${sum} で持ち点合計 ${startPoint*4} と一致しません。記録しますか？`)) return;
  }

  const dup = data.games.find(g => g.date === date && g.phase === phase && g.table === tableName && g.round === round);
  if (dup) {
    if (!confirm(`${date} ${phase==='qualifying'?'予選':'決勝'} ${tableName}卓 ${round}回戦 のデータが既に存在します。追加で記録しますか？`)) return;
  }

  const sorted = [...results].map((r, i) => ({...r, originalIdx: i})).sort((a, b) => b.score - a.score);
  sorted.forEach((r, rankIdx) => {
    const rank = rankIdx + 1;
    const points = (r.score - returnPoint) / 1000 + umaParts[rankIdx] + (rank === 1 ? oka : 0);
    results[r.originalIdx].rank = rank;
    results[r.originalIdx].points = Math.round(points * 10) / 10;
  });

  try {
    await db.collection('league2_games').add({
      date, phase, table: tableName, round,
      startPoint, returnPoint, uma: umaParts, oka, results,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    for (let i = 0; i < 4; i++) document.getElementById(`gs_${i}`).value = '';
    const roundSel = document.getElementById('gameRound');
    if (round < 8) roundSel.value = String(round + 1);
  } catch (err) {
    alert('記録に失敗: ' + err.message);
  }
}

async function removeGame(id) {
  if (currentRole !== 'admin') return alert('管理者のみ操作可能です');
  if (!confirm('この対局を削除しますか？')) return;
  try {
    await db.collection('league2_games').doc(id).delete();
  } catch (err) {
    alert('削除に失敗: ' + err.message);
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';

  if (tab === 'qualifying') renderQualifying();
  else if (tab === 'final') renderFinal();
}

function renderQualifying() {
  const filtered = data.games.filter(g => g.phase === 'qualifying');
  const stats = calcStatsByTeam(filtered);
  document.getElementById('qualifyingRanking').innerHTML =
    buildRankingTable(stats, { diffMode: 'border', borderRank: 4, borderLabel: '決勝進出ライン' });
}

function renderFinal() {
  const filtered = data.games.filter(g => g.phase === 'final');
  const stats = calcStatsByTeam(filtered);
  document.getElementById('finalRanking').innerHTML =
    buildRankingTable(stats, { diffMode: 'top' });
}

function calcStatsByTeam(games) {
  const stats = {};
  games.forEach(g => {
    g.results.forEach(r => {
      const key = r.team || '(未所属)';
      if (!stats[key]) {
        stats[key] = { team: key, games: 0, totalPoints: 0, ranks: [0, 0, 0, 0] };
      }
      stats[key].games++;
      stats[key].totalPoints += r.points;
      if (r.rank >= 1 && r.rank <= 4) {
        stats[key].ranks[r.rank - 1]++;
      }
    });
  });
  return Object.values(stats)
    .map(s => ({
      ...s,
      avgRank: s.games > 0
        ? s.ranks.reduce((sum, c, i) => sum + c * (i + 1), 0) / s.games
        : 0
    }))
    .sort((a, b) => b.totalPoints - a.totalPoints);
}
 
function buildRankingTable(stats, options = {}) {
  if (stats.length === 0) return '<div class="empty">対局データがありません</div>';

  const diffMode = options.diffMode || (options.borderRank ? 'border' : null);
  const borderRank = options.borderRank || null;
  const borderLabel = options.borderLabel || '決勝進出ライン';
  const showBorderLine = options.showBorderLine !== false;

  // 比較基準ポイント
  let basePoint = null;
  let middleHeader = '平均順位';
  if (diffMode === 'border' && borderRank && stats[borderRank - 1]) {
    basePoint = stats[borderRank - 1].totalPoints;
    middleHeader = 'ボーダー差';
  } else if (diffMode === 'top' && stats[0]) {
    basePoint = stats[0].totalPoints;
    middleHeader = 'トップ差';
  }
  const showDiff = basePoint !== null;

  const rows = stats.map((s, i) => {
    const rank = i + 1;
    // 中央セル（平均順位 / ボーダー差 / トップ差）の生成部分
let middleCell;
if (diffMode === 'border' && showBorderDiff) {
    const diff = Math.round((s.totalPoints - borderPoint) * 10) / 10;
    middleCell = `<td class="points-cell ${rank <= borderRank ? 'positive' : 'negative'}">${formatPoints(diff)}</td>`;
  } else if (diffMode === 'top') {
    if (rank === 1) {
      // 1位は「―」を表示
      middleCell = `<td style="color:#a0aec0">―</td>`;
    } else {
      // トップ差は ▲ を付けず、絶対値で表示
      const diff = Math.round((topPoint - s.totalPoints) * 10) / 10;
      const diffStr = diff.toFixed(1);
      middleCell = `<td class="points-cell negative">${diffStr}</td>`;
    }
  } else {
    middleCell = `<td>${s.avgRank.toFixed(2)}</td>`;
  }

    const rowHtml = `
      <tr>
        <td class="rank-${rank <= 3 ? rank : ''}">${rank}</td>
        <td style="text-align:left;padding-left:16px;font-weight:bold">${escapeHtml(s.team)}</td>
        <td>${s.games}</td>
        <td class="points-cell ${s.totalPoints >= 0 ? 'positive' : 'negative'}"><strong>${formatPoints(s.totalPoints)}</strong></td>
        ${middleCell}
        <td>${s.ranks[0]}</td><td>${s.ranks[1]}</td><td>${s.ranks[2]}</td><td>${s.ranks[3]}</td>
      </tr>
    `;

    // ボーダーモードのときだけ「決勝進出ライン」を挿入
    if (diffMode === 'border' && showBorderLine && borderRank && rank === borderRank && stats.length > borderRank) {
      return rowHtml + `
        <tr class="border-line-row">
          <td colspan="9">
            <div class="border-line">
              <span class="border-line-text">▼ ${escapeHtml(borderLabel)} ▼</span>
            </div>
          </td>
        </tr>
      `;
    }
    return rowHtml;
  }).join('');

  return `
    <table>
      <thead>
        <tr>
          <th>順位</th><th>チーム</th><th>対局数</th>
          <th>合計ポイント</th>
          <th>${middleHeader}</th>
          <th>1位</th><th>2位</th><th>3位</th><th>4位</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function sortHistory(key) {
  const idx = historySortKeys.findIndex(s => s.key === key);
  if (idx === 0) {
    historySortKeys[0].dir = historySortKeys[0].dir === 'asc' ? 'desc' : 'asc';
  } else if (idx > 0) {
    const item = historySortKeys.splice(idx, 1)[0];
    historySortKeys.unshift(item);
  } else {
    const defaultDir = key === 'date' ? 'desc' : 'asc';
    historySortKeys.unshift({ key, dir: defaultDir });
  }
  renderHistory();
}

function renderHistory() {
  const gh = document.getElementById('gameHistory');
  const filter = document.getElementById('historyFilter').value;
  let games = data.games;
  if (filter !== 'all') games = games.filter(g => g.phase === filter);
  if (games.length === 0) { gh.innerHTML = '<div class="empty">対局履歴がありません</div>'; return; }

  const sorted = [...games].sort((a, b) => {
    for (const s of historySortKeys) {
      let av, bv;
      if (s.key === 'date') { av = a.date || ''; bv = b.date || ''; }
      else if (s.key === 'phase') { av = a.phase || ''; bv = b.phase || ''; }
      else if (s.key === 'table') { av = a.table || ''; bv = b.table || ''; }
      else if (s.key === 'round') { av = a.round || 0; bv = b.round || 0; }
      let cmp = (typeof av === 'number') ? av - bv : av.localeCompare(bv);
      if (cmp !== 0) return s.dir === 'asc' ? cmp : -cmp;
    }
    return 0;
  });

  const sortInfo = (key) => {
    const idx = historySortKeys.findIndex(s => s.key === key);
    if (idx < 0) return { active: false };
    return { active: true, dir: historySortKeys[idx].dir, order: idx + 1 };
  };
  const arrow = (key) => {
    const info = sortInfo(key);
    if (!info.active) return '<span class="sort-icon">⇅</span>';
    const dirArrow = info.dir === 'asc' ? '▲' : '▼';
    const orderLabel = historySortKeys.length > 1 ? `<sub style="font-size:9px">${info.order}</sub>` : '';
    return `<span class="sort-icon">${dirArrow}${orderLabel}</span>`;
  };
  const ac = (key) => sortInfo(key).active ? 'sortable active' : 'sortable';
  const showDelete = currentRole === 'admin';

  gh.innerHTML = `
    <table>
      <thead>
        <tr>
          <th class="${ac('date')}" onclick="sortHistory('date')">日付${arrow('date')}</th>
          <th class="${ac('phase')}" onclick="sortHistory('phase')">区分${arrow('phase')}</th>
          <th class="${ac('table')}" onclick="sortHistory('table')">卓${arrow('table')}</th>
          <th class="${ac('round')}" onclick="sortHistory('round')">回戦${arrow('round')}</th>
          <th>1位</th><th>2位</th><th>3位</th><th>4位</th>${showDelete ? '<th></th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${sorted.map(g => {
          const byRank = [...g.results].sort((a, b) => a.rank - b.rank);
          const tableLabel = g.table ? `<span class="table-tag">${escapeHtml(g.table)}卓</span>` : '-';
          const roundLabel = g.round ? `<span class="round-tag">${g.round}回戦</span>` : '-';
          const phaseLabel = g.phase === 'final'
            ? `<span class="phase-tag phase-final">決勝</span>`
            : `<span class="phase-tag phase-qualifying">予選</span>`;
          return `<tr>
            <td>${g.date}</td><td>${phaseLabel}</td><td>${tableLabel}</td><td>${roundLabel}</td>
            ${byRank.map(r => {
              // 対局時のteamを優先、なければ現在の所属を検索
              let team = r.team;
              if (!team) {
                const p = findPlayerByName(r.player);
                team = p ? p.team : '';
              }
              return `
                <td class="history-cell">
                  <span class="team-name">${escapeHtml(team)}</span>
                  <span class="player-name">${escapeHtml(r.player)}</span>
                  <span class="score-line">${formatScore(r.score)}</span>
                  <span class="points-line ${r.points >= 0 ? 'positive' : 'negative'}"><strong>${formatPoints(r.points)}</strong></span>
                </td>`;
            }).join('')}
            ${showDelete ? `<td><button class="small danger" onclick="removeGame('${g.id}')">削除</button></td>` : ''}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function render() {
  document.getElementById('playerCount').textContent = data.players.length + '人';
  document.getElementById('gameCount').textContent = data.games.length + '局';

  if (currentRole === 'admin') {
    // プレイヤーリスト: チームごとにグループ化して表示
    const pl = document.getElementById('playerList');
    if (data.players.length === 0) {
      pl.innerHTML = '<div class="empty">プレイヤーが登録されていません</div>';
    } else {
      const grouped = {};
      data.players.forEach(p => {
        if (!grouped[p.team]) grouped[p.team] = [];
        grouped[p.team].push(p);
      });
      pl.innerHTML = Object.keys(grouped).sort().map(team => `
        <div class="team-group">
          <div class="team-group-title">🏷️ ${escapeHtml(team)}</div>
          ${grouped[team].map(p => `
            <div class="player-list-card">
              <span>${escapeHtml(p.name)}</span>
              <button class="small danger" onclick="removePlayer('${p.id}')">削除</button>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    // 対局入力欄
    const gi = document.getElementById('gameInputs');
    gi.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      const div = document.createElement('div');
      div.innerHTML = `
        <label>${i+1}人目</label>
        <select id="gp_${i}">
          <option value="">--選択--</option>
          ${data.players.map(p => `<option value="${escapeHtml(p.name)}">${escapeHtml(p.team)} / ${escapeHtml(p.name)}</option>`).join('')}
        </select>
        <input type="number" id="gs_${i}" placeholder="例: 321 or 32100" oninput="updateSum()">
      `;
      gi.appendChild(div);
    }
    updateSum();
  }
 
  renderQualifying();
  renderFinal();
  renderHistory();
}

function updateSum() {
  let sum = 0, count = 0;
  for (let i = 0; i < 4; i++) {
    const v = normalizeScore(document.getElementById(`gs_${i}`)?.value);
    if (!isNaN(v)) { sum += v; count++; }
  }
  const start = parseInt(document.getElementById('startPoint').value) || 25000;
  const target = start * 4;
  const sumEl = document.getElementById('scoreSum');
  if (sumEl) {
    sumEl.textContent = count > 0 ? `素点合計: ${sum.toLocaleString()} / ${target.toLocaleString()} ${sum === target ? '✓' : (count === 4 ? '✗ 不一致' : '')}` : '';
  }
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `league2_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

init();
</script>
</body>
</html>
