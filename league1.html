async function init() {
  document.getElementById('gameDate').valueAsDate = new Date();
  document.getElementById('loginPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  try {
    document.getElementById('loginStatus').textContent = '接続中...';
    await auth.signInAnonymously();

    // ログインチェック: ログインしていない場合はindex.htmlに戻す
    const uid = auth.currentUser.uid;
    const memberDoc = await db.collection('members').doc(uid).get();
    const savedRole = localStorage.getItem('mahjongRole');
    if (memberDoc.exists && savedRole) {
      currentRole = memberDoc.data().role || savedRole;
      enterApp();
    } else {
      // 未ログインならハブページへ
      location.href = 'index.html';
    }
  } catch (err) {
    console.error(err);
    document.getElementById('loginStatus').textContent = '接続に失敗しました: ' + err.message;
  }
}

async function tryLogin() {
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  const pw = document.getElementById('loginPassword').value.trim();
  if (!pw) { errEl.textContent = 'パスワードを入力してください'; return; }

  try {
    const configDoc = await db.collection('config').doc('app').get();
    if (!configDoc.exists) {
      errEl.textContent = '設定が見つかりません。管理者に確認してください。';
      return;
    }
    const cfg = configDoc.data();
    let role = null;
    if (cfg.adminPassword && pw === cfg.adminPassword) role = 'admin';
    else if (cfg.viewerPassword && pw === cfg.viewerPassword) role = 'viewer';

    if (!role) {
      errEl.textContent = 'パスワードが違います';
      return;
    }

    const uid = auth.currentUser.uid;
    await db.collection('members').doc(uid).set({
      role,
      joinedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    localStorage.setItem('mahjongRole', role);
    currentRole = role;
    enterApp();
  } catch (err) {
    console.error(err);
    errEl.textContent = 'エラー: ' + err.message;
  }
}

function enterApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainContainer').style.display = 'block';

  // 役割に応じてUI切替
  const adminArea = document.getElementById('adminArea');
  const roleBadge = document.getElementById('roleBadge');
  const historyToolbar = document.getElementById('historyToolbar');
  if (currentRole === 'admin') {
    adminArea.style.display = 'block';
    roleBadge.innerHTML = '<span class="role-badge role-admin">管理者</span>';
    historyToolbar.style.display = 'flex';
  } else {
    adminArea.style.display = 'none';
    roleBadge.innerHTML = '<span class="role-badge role-viewer">閲覧者</span>';
    historyToolbar.style.display = 'none';
  }

  startSync();
}

function logout() {
  if (!confirm('ログアウトしますか？')) return;
  localStorage.removeItem('mahjongRole');
  if (unsubscribeGames) unsubscribeGames();
  if (unsubscribePlayers) unsubscribePlayers();
  location.reload();
}

function startSync() {
  document.getElementById('syncStatus').textContent = '接続中...';

  unsubscribePlayers = db.collection('league1_players').orderBy('createdAt', 'asc')
    .onSnapshot(snapshot => {
      data.players = snapshot.docs.map(d => d.data().name);
      render();
    }, err => {
      console.error('players sync error', err);
      document.getElementById('syncStatus').textContent = '同期エラー';
    });

  unsubscribeGames = db.collection('league1_games').onSnapshot(snapshot => {
    data.games = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('syncStatus').textContent = `同期中 (最終更新: ${new Date().toLocaleTimeString()})`;
    render();
  }, err => {
    console.error('games sync error', err);
    document.getElementById('syncStatus').textContent = '同期エラー';
  });
}

function normalizeScore(raw) {
  if (raw === '' || raw === null || raw === undefined) return NaN;
  const v = parseInt(raw);
  if (isNaN(v)) return NaN;
  return Math.abs(v) < 1000 ? v * 100 : v;
}

function formatPoints(p) {
  const rounded = Math.round(p * 10) / 10;
  const abs = Math.abs(rounded);
  const numStr = abs.toFixed(1);  // 例: "999.9", "99.9", "5.3", "0.0"
  let sign = '';
  if (rounded < 0) sign = '▲';
  // 符号部と数値部を別spanで包む
  return `<span class="pt-sign">${sign}</span><span class="pt-num">${numStr}</span>`;
}

function formatScore(s) { return s.toLocaleString('en-US'); }

async function addPlayer() {
  if (currentRole !== 'admin') return alert('管理者のみ操作可能です');
  const input = document.getElementById('playerName');
  const name = input.value.trim();
  if (!name) return alert('プレイヤー名を入力してください');
  if (data.players.includes(name)) return alert('同名のプレイヤーが既に存在します');
  try {
    await db.collection('league1_players').add({
      name,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    input.value = '';
  } catch (err) {
    alert('追加に失敗: ' + err.message);
  }
}

async function removePlayer(name) {
  if (currentRole !== 'admin') return alert('管理者のみ操作可能です');
  const used = data.games.some(g => g.results.some(r => r.player === name));
  if (used) {
    if (!confirm(`${name}さんは対局履歴に含まれています。削除しますか？(履歴は残ります)`)) return;
  }
  try {
    const snapshot = await db.collection('league1_players').where('name', '==', name).get();
    const batch = db.batch();
    snapshot.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
  } catch (err) {
    alert('削除に失敗: ' + err.message);
  }
}

async function addGame() {
  if (currentRole !== 'admin') return alert('管理者のみ操作可能です');
  const date = document.getElementById('gameDate').value;
  if (!date) return alert('対局日を入力してください');
  const tableName = document.getElementById('gameTable').value;
  const round = parseInt(document.getElementById('gameRound').value);

  const umaParts = document.getElementById('umaConfig').value.split(',').map(s => parseFloat(s.trim()));
  if (umaParts.length !== 4 || umaParts.some(isNaN)) return alert('ウマは "30,10,-10,-30" の形式で入力してください');
  const oka = parseFloat(document.getElementById('okaConfig').value) || 0;
  const startPoint = parseInt(document.getElementById('startPoint').value) || 25000;
  const returnPoint = parseInt(document.getElementById('returnPoint').value) || startPoint;

  const results = [];
  for (let i = 0; i < 4; i++) {
    const player = document.getElementById(`gp_${i}`).value;
    const score = normalizeScore(document.getElementById(`gs_${i}`).value);
    if (!player) return alert(`${i+1}人目のプレイヤーを選んでください`);
    if (isNaN(score)) return alert(`${i+1}人目の素点を入力してください`);
    if (results.some(r => r.player === player)) return alert('同じプレイヤーが重複しています');
    results.push({ player, score });
  }

  const sum = results.reduce((a, r) => a + r.score, 0);
  if (sum !== startPoint * 4) {
    if (!confirm(`素点の合計が ${sum} で持ち点合計 ${startPoint*4} と一致しません。記録しますか？`)) return;
  }

  const dup = data.games.find(g => g.date === date && g.table === tableName && g.round === round);
  if (dup) {
    if (!confirm(`${date} ${tableName}卓 ${round}回戦 のデータが既に存在します。追加で記録しますか？`)) return;
  }

  const sorted = [...results].map((r, i) => ({...r, originalIdx: i})).sort((a, b) => b.score - a.score);
  sorted.forEach((r, rankIdx) => {
    const rank = rankIdx + 1;
    const points = (r.score - returnPoint) / 1000 + umaParts[rankIdx] + (rank === 1 ? oka : 0);
    results[r.originalIdx].rank = rank;
    results[r.originalIdx].points = Math.round(points * 10) / 10;
  });

  try {
    await db.collection('league1_games').add({
      date, table: tableName, round,
      startPoint, returnPoint, uma: umaParts, oka, results,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    for (let i = 0; i < 4; i++) document.getElementById(`gs_${i}`).value = '';
    const roundSel = document.getElementById('gameRound');
    if (round < 8) roundSel.value = String(round + 1);
  } catch (err) {
    alert('記録に失敗: ' + err.message);
  }
}

async function removeGame(id) {
  if (currentRole !== 'admin') return alert('管理者のみ操作可能です');
  if (!confirm('この対局を削除しますか？')) return;
  try {
    await db.collection('league1_games').doc(id).delete();
  } catch (err) {
    alert('削除に失敗: ' + err.message);
  }
}

function switchTab(tab) {
  currentTab = tab;
  ['total','daily','period'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
    document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'daily') renderDaily();
  if (tab === 'period') renderPeriod();
}

function calcStats(games) {
  const stats = {};
  games.forEach(g => {
    g.results.forEach(r => {
      if (!stats[r.player]) {
        stats[r.player] = { player: r.player, games: 0, totalPoints: 0, ranks: [0,0,0,0], avgRank: 0 };
      }
      stats[r.player].games++;
      stats[r.player].totalPoints += r.points;
      stats[r.player].ranks[r.rank - 1]++;
    });
  });
  Object.values(stats).forEach(s => {
    if (s.games > 0) {
      const rankSum = s.ranks.reduce((a, c, i) => a + c * (i + 1), 0);
      s.avgRank = rankSum / s.games;
      s.totalPoints = Math.round(s.totalPoints * 10) / 10;
    }
  });
  return Object.values(stats).sort((a, b) => b.totalPoints - a.totalPoints);
}

function buildRankingTable(stats) {
  if (stats.length === 0) return '<div class="empty">対局データがありません</div>';
  return `
    <table>
      <thead>
        <tr>
          <th>順位</th><th>プレイヤー</th><th>対局数</th>
          <th>合計</th><th>平均着順</th>
          <th>1位</th><th>2位</th><th>3位</th><th>4位</th>
        </tr>
      </thead>
      <tbody>
        ${stats.map((s, i) => `
          <tr>
            <td class="rank-${i+1 <= 3 ? i+1 : ''}">${i+1}</td>
            <td style="text-align:left;padding-left:16px">${escapeHtml(s.player)}</td>
            <td>${s.games}</td>
            <td class="points-cell ${s.totalPoints >= 0 ? 'positive' : 'negative'}"><strong>${formatPoints(s.totalPoints)}</strong></td>
            <td>${s.avgRank.toFixed(2)}</td>
            <td>${s.ranks[0]}</td><td>${s.ranks[1]}</td><td>${s.ranks[2]}</td><td>${s.ranks[3]}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderTotal() {
  document.getElementById('rankingTable').innerHTML = buildRankingTable(calcStats(data.games));
}

function renderDaily() {
  const dates = [...new Set(data.games.map(g => g.date))].sort((a, b) => b.localeCompare(a));
  const select = document.getElementById('dailyDateSelect');
  const prev = select.value;
  select.innerHTML = '<option value="all">全ての対局日を表示</option>' +
    dates.map(d => `<option value="${d}">${d}</option>`).join('');
  if (dates.includes(prev) || prev === 'all') select.value = prev;

  const target = document.getElementById('dailyRanking');
  if (data.games.length === 0) { target.innerHTML = '<div class="empty">対局データがありません</div>'; return; }

  const selected = select.value;
  const showDates = selected === 'all' ? dates : [selected];
  target.innerHTML = showDates.map(date => {
    const dayGames = data.games.filter(g => g.date === date);
    return `
      <div class="daily-section">
        <div class="daily-date">📅 ${date} <span class="badge">${dayGames.length}局</span></div>
        ${buildRankingTable(calcStats(dayGames))}
      </div>
    `;
  }).join('');
}

function renderPeriod() {
  const from = document.getElementById('periodFrom').value;
  const to = document.getElementById('periodTo').value;
  let games = data.games;
  if (from) games = games.filter(g => g.date >= from);
  if (to) games = games.filter(g => g.date <= to);
  let header = (from || to)
    ? `<h3>${from || '最初'} 〜 ${to || '最新'} の集計 <span class="badge">${games.length}局</span></h3>`
    : `<h3>全期間の集計 <span class="badge">${games.length}局</span></h3>`;
  document.getElementById('periodRanking').innerHTML = header + buildRankingTable(calcStats(games));
}

function clearPeriod() {
  document.getElementById('periodFrom').value = '';
  document.getElementById('periodTo').value = '';
  renderPeriod();
}

// ヘッダークリック時の挙動:
// - そのキーが先頭なら昇降を切替
// - そのキーが含まれるが先頭でないなら、先頭に持ってくる(方向は維持)
// - 含まれないなら先頭に追加(デフォルト方向で)
function sortHistory(key) {
  const idx = historySortKeys.findIndex(s => s.key === key);
  if (idx === 0) {
    historySortKeys[0].dir = historySortKeys[0].dir === 'asc' ? 'desc' : 'asc';
  } else if (idx > 0) {
    const item = historySortKeys.splice(idx, 1)[0];
    historySortKeys.unshift(item);
  } else {
    const defaultDir = key === 'date' ? 'desc' : 'asc';
    historySortKeys.unshift({ key, dir: defaultDir });
  }
  renderHistory();
}

function renderHistory() {
  const gh = document.getElementById('gameHistory');
  if (data.games.length === 0) { gh.innerHTML = '<div class="empty">対局履歴がありません</div>'; return; }

  // 複合ソート: 優先順位リストに従って順番に比較
  const sorted = [...data.games].sort((a, b) => {
    for (const s of historySortKeys) {
      let av, bv;
      if (s.key === 'date') { av = a.date || ''; bv = b.date || ''; }
      else if (s.key === 'table') { av = a.table || ''; bv = b.table || ''; }
      else if (s.key === 'round') { av = a.round || 0; bv = b.round || 0; }
      let cmp = (typeof av === 'number') ? av - bv : av.localeCompare(bv);
      if (cmp !== 0) return s.dir === 'asc' ? cmp : -cmp;
    }
    return 0;
  });

  // ヘッダー表示用ヘルパー
  const sortInfo = (key) => {
    const idx = historySortKeys.findIndex(s => s.key === key);
    if (idx < 0) return { active: false, dir: null, order: null };
    return { active: true, dir: historySortKeys[idx].dir, order: idx + 1 };
  };
  const arrow = (key) => {
    const info = sortInfo(key);
    if (!info.active) return '<span class="sort-icon">⇅</span>';
    const dirArrow = info.dir === 'asc' ? '▲' : '▼';
    // 優先順位が2以上なら数字で示す
    const orderLabel = historySortKeys.length > 1 ? `<sub style="font-size:9px">${info.order}</sub>` : '';
    return `<span class="sort-icon">${dirArrow}${orderLabel}</span>`;
  };
  const ac = (key) => sortInfo(key).active ? 'sortable active' : 'sortable';
  const showDelete = currentRole === 'admin';

  gh.innerHTML = `
    <div class="row" style="font-size:12px; color:#718096; margin-bottom:8px;">
      ヘッダーをクリックしてソート(複合キー対応)。優先順位の数字は左下に表示されます。
      <button class="small secondary" onclick="resetHistorySort()">並び順をリセット</button>
    </div>
    <table>
      <thead>
        <tr>
          <th class="${ac('date')}" onclick="sortHistory('date')">日付${arrow('date')}</th>
          <th class="${ac('table')}" onclick="sortHistory('table')">卓${arrow('table')}</th>
          <th class="${ac('round')}" onclick="sortHistory('round')">回戦${arrow('round')}</th>
          <th>1位</th><th>2位</th><th>3位</th><th>4位</th>${showDelete ? '<th></th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${sorted.map(g => {
          const byRank = [...g.results].sort((a, b) => a.rank - b.rank);
          const tableLabel = g.table ? `<span class="table-tag">${escapeHtml(g.table)}卓</span>` : '-';
          const roundLabel = g.round ? `<span class="round-tag">${g.round}回戦</span>` : '-';
          return `<tr>
            <td>${g.date}</td><td>${tableLabel}</td><td>${roundLabel}</td>
            ${byRank.map(r => `
              <td class="history-cell">
                <span class="player-name">${escapeHtml(r.player)}</span>
                <span class="score-line">${formatScore(r.score)}点</span>
                <span class="points-line ${r.points >= 0 ? 'positive' : 'negative'}"><strong>${formatPoints(r.points)}</strong></span>
              </td>`).join('')}
            ${showDelete ? `<td><button class="small danger" onclick="removeGame('${g.id}')">削除</button></td>` : ''}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function resetHistorySort() {
  historySortKeys = [
    { key: 'date', dir: 'desc' },
    { key: 'table', dir: 'asc' },
    { key: 'round', dir: 'asc' }
  ];
  renderHistory();
}


function render() {
  document.getElementById('playerCount').textContent = data.players.length + '人';
  document.getElementById('gameCount').textContent = data.games.length + '局';

  // 管理者のみプレイヤーリスト・入力欄を更新
  if (currentRole === 'admin') {
    const pl = document.getElementById('playerList');
    if (data.players.length === 0) {
      pl.innerHTML = '<div class="empty">プレイヤーが登録されていません</div>';
    } else {
      pl.innerHTML = '<div class="row" style="margin-top:10px">' +
        data.players.map(p => `<span style="background:#ebf4ff;padding:6px 12px;border-radius:20px;display:inline-flex;align-items:center;gap:6px">${escapeHtml(p)}<button class="small danger" onclick="removePlayer('${escapeJs(p)}')">×</button></span>`).join('') +
        '</div>';
    }
    const gi = document.getElementById('gameInputs');
    gi.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      const div = document.createElement('div');
      div.innerHTML = `
        <label>${i+1}人目</label>
        <select id="gp_${i}">
          <option value="">--選択--</option>
          ${data.players.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}
        </select>
        <input type="number" id="gs_${i}" placeholder="例: 321 or 32100" oninput="updateSum()">
      `;
      gi.appendChild(div);
    }
    updateSum();
  }

  renderTotal();
  if (currentTab === 'daily') renderDaily();
  if (currentTab === 'period') renderPeriod();
  renderHistory();
}

function updateSum() {
  let sum = 0, count = 0;
  for (let i = 0; i < 4; i++) {
    const v = normalizeScore(document.getElementById(`gs_${i}`)?.value);
    if (!isNaN(v)) { sum += v; count++; }
  }
  const start = parseInt(document.getElementById('startPoint').value) || 25000;
  const target = start * 4;
  const sumEl = document.getElementById('scoreSum');
  if (sumEl) {
    sumEl.textContent = count > 0 ? `素点合計: ${sum.toLocaleString()} / ${target.toLocaleString()} ${sum === target ? '✓' : (count === 4 ? '✗ 不一致' : '')}` : '';
  }
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mahjong_league_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeJs(s) {
  return String(s).replace(/['\\]/g, '\\$&');
}

init();
</script>
